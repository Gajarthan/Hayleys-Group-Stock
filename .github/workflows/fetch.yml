name: Fetch HAYL Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *" # every 2 hours

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install OpenCode CLI
        run: npm install -g opencode-ai@latest
      - name: OpenCode test run
        run: opencode run "Explain how closures work in JavaScript"
      - run: npm ci
      - run: npm run fetch
      - name: Commit data updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update HAYL data"
          commit_options: "--no-verify"
          file_pattern: data/hayl/*
